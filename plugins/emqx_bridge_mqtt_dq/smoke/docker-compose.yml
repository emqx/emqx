## Docker-compose for disk-queue durability smoke test.
##
## Two EMQX nodes on a shared network:
##   remote — plain EMQX (the target broker)
##   local  — EMQX with emqx_bridge_mqtt_dq plugin installed
##
## Named volume ensures the local node's disk queue survives container restarts.

services:
  remote:
    image: ${IMAGE:-emqx/emqx-enterprise:6.1.1}
    container_name: dq-remote
    hostname: dq-remote
    ports:
      - "4883:1883"
      - "48083:18083"
    environment:
      EMQX_NODE_NAME: "emqx@dq-remote"
      EMQX_NODE_COOKIE: "dq-smoke-secret"
      EMQX_LICENSE__KEY: "evaluation"
    networks:
      - dq-smoke

  local:
    image: ${IMAGE:-emqx/emqx-enterprise:6.1.1}
    container_name: dq-local
    hostname: dq-local
    ports:
      - "3883:1883"
      - "38083:18083"
    environment:
      EMQX_NODE_NAME: "emqx@dq-local"
      EMQX_NODE_COOKIE: "dq-smoke-secret"
      EMQX_LICENSE__KEY: "evaluation"
      EMQX_PLUGINS__INSTALL_DIR: "/opt/emqx/plugins"
      EMQX_PLUGINS__STATES: '[{name_vsn = "${PLUGIN}"}]'
      EMQXDQ_REMOTE_HOST: "dq-remote:1883"
    volumes:
      - dq-local-data:/opt/emqx/data
      - ../../../_build/plugins:/opt/emqx/plugins
    networks:
      - dq-smoke

volumes:
  dq-local-data:

networks:
  dq-smoke:
    name: dq-smoke
