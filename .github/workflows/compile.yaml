name: Compile

concurrency:
  group: compile-${{ inputs.build_type }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      builder:
        required: true
        type: string
      build_type:
        required: true
        type: string

permissions:
  contents: read

env:
  IS_CI: "yes"

defaults:
  run:
    shell: bash

jobs:
  compile:
    runs-on: ubuntu-22.04
    container: ${{ inputs.builder }}
    strategy:
      matrix:
        profile:
          - emqx-enterprise
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Work around https://github.com/actions/checkout/issues/766
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - id: compile
        env:
          PROFILE: ${{ matrix.profile }}
          ENABLE_COVER_COMPILE: 1
          MAKE_TARGET: ${{ inputs.build_type == 'test' && 'test-compile' || format('{0}-compile', matrix.profile) }}
          ARTIFACT_NAME: ${{ format('{0}-{1}.zip', matrix.profile, inputs.build_type) }}
        run: |
          set -exuo pipefail
          make ensure-rebar3
          # Ensure generated dashboard i18n assets (for example desc.zh.hocon)
          # exist in test artifacts consumed by downstream CT jobs.
          if [ "${{ inputs.build_type }}" = "test" ]; then
            make pre-compile
          fi
          make ${MAKE_TARGET}
          echo "export PROFILE=${PROFILE}" | tee -a env.sh
          echo "export PKG_VSN=$(./pkg-vsn.sh ${PROFILE})" | tee -a env.sh
          zip -ryq -x@.github/workflows/.zipignore2 $ARTIFACT_NAME .
      - name: Check API scope coverage
        if: inputs.build_type == 'test'
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          ## On release-60 the build system is mix, and `make test-compile`
          ## targets PROFILE=${PROFILE}-test, so beam files land under
          ## _build/${PROFILE}-test/lib, not _build/${PROFILE}/lib.
          ./scripts/check-api-scope-coverage.escript _build/${PROFILE}-test/lib
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.profile }}-${{ inputs.build_type }}
          path: ${{ matrix.profile }}-${{ inputs.build_type }}.zip
          retention-days: 7
          if-no-files-found: error
      - name: build release with schema dump
        if: inputs.build_type == 'release'
        env:
          PROFILE: ${{ matrix.profile }}
        run: make ${PROFILE}-rel
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: inputs.build_type == 'release'
        with:
          name: "${{ matrix.profile }}-schema-dump"
          path: |
            env.sh
            scripts/spellcheck
            _build/docgen/${{ matrix.profile }}/*.json
            _build/docgen/${{ matrix.profile }}/*.hocon
          retention-days: 7
          if-no-files-found: error
