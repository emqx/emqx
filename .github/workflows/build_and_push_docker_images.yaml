name: Build and push docker images

concurrency:
  group: docker-build-${{ github.event_name }}-${{ inputs.profile }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      profile:
        required: true
        type: string
      latest:
        required: false
        type: string
        default: false
      publish:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKER_HUB_USER:
        required: false
      DOCKER_HUB_TOKEN:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_DEFAULT_REGION:
        required: false
      AWS_S3_BUCKET:
        required: false
      AWS_CLOUDFRONT_ID:
        required: false
  workflow_dispatch:
    inputs:
      ref:
        required: false
      profile:
        required: false
        type: string
        default: 'emqx-enterprise'
      latest:
        required: false
        type: boolean
        default: false
      publish:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  docker:
    runs-on: ${{ format('aws-ubuntu22.04-{0}', matrix.arch) }}
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        profile:
          - "${{ inputs.profile }}"
        arch:
          - amd64
          - arm64

    env:
      PROFILE: ${{ matrix.profile }}
      DOCKER_ORG: ${{ github.repository_owner }}
      ARCH: ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build docker image
        env:
          DOCKER_PUSH: false
          DOCKER_BUILD_NOCACHE: true
          DOCKER_LOAD: true
        run: |
          ./build ${PROFILE} docker
          echo "Built tags:"
          echo "==========="
          cat .emqx_docker_image_tags
          echo "==========="
          echo "_EMQX_DOCKER_IMAGE_TAG=$(head -n 1 .emqx_docker_image_tags)" >> $GITHUB_ENV

      - name: Verify that size of docker image is less than 150 MB
        run: |
          docker save $_EMQX_DOCKER_IMAGE_TAG | gzip -c | wc -c | xargs -I {} test {} -lt 150000000

      - name: smoke test
        timeout-minutes: 5
        run: |
          CID=$(docker run -d -p 18083:18083 $_EMQX_DOCKER_IMAGE_TAG)
          HTTP_PORT=$(docker inspect --format='{{(index (index .NetworkSettings.Ports "18083/tcp") 0).HostPort}}' $CID)
          ./scripts/test/emqx-smoke-test.sh localhost $HTTP_PORT
          docker rm -f $CID
          ./scripts/test/cluster-smoke-test.sh $_EMQX_DOCKER_IMAGE_TAG

      - name: dashboard tests
        working-directory: ./scripts/ui-tests
        timeout-minutes: 5
        run: |
          set -eu
          docker compose up --abort-on-container-exit --exit-code-from selenium
          docker compose rm -fsv

      - name: test node_dump
        run: |
          CID=$(docker run -d -P $_EMQX_DOCKER_IMAGE_TAG)
          docker exec -t -u root -w /root $CID bash -c 'apt-get -y update && apt-get -y install net-tools'
          docker exec -t -u root $CID node_dump
          docker rm -f $CID

      - name: Export docker image
        run: |
          docker save "${_EMQX_DOCKER_IMAGE_TAG}" | gzip > $PROFILE-docker-${{ matrix.arch }}.tar.gz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ matrix.profile }}-docker-${{ matrix.arch }}"
          path: "${{ matrix.profile }}-docker-${{ matrix.arch }}.tar.gz"
          retention-days: 7

  docker-sfodbc:
    runs-on: ${{ format('aws-ubuntu22.04-{0}', matrix.arch) }}
    if: inputs.profile == 'emqx-enterprise'
    needs:
      - docker
    defaults:
      run:
        shell: bash

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    env:
      PROFILE: ${{ inputs.profile }}
      ARCH: ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: "${{ env.PROFILE }}-docker-${{ matrix.arch }}"

      - name: Load and push base image to local registry
        run: |
          # Load the base image
          BASE_TAG=$(docker load < $PROFILE-docker-${{ matrix.arch }}.tar.gz | grep "Loaded image:" | sed 's/Loaded image: //')
          echo "Loaded base image: $BASE_TAG"

          # Extract version from tag
          PKG_VSN=$(echo "$BASE_TAG" | sed 's/.*://')
          echo "PKG_VSN=$PKG_VSN" >> $GITHUB_ENV

          # Push to local registry so buildx can access it
          LOCAL_TAG="localhost:5000/emqx/${PROFILE}:${PKG_VSN}"
          docker tag "$BASE_TAG" "$LOCAL_TAG"
          docker push "$LOCAL_TAG"

          echo "BASE_TAG=$LOCAL_TAG" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: network=host

      - name: Build snowflake docker image
        env:
          DOCKER_PUSH: false
          DOCKER_BUILD_NOCACHE: true
          DOCKER_LOAD: true
          EMQX_DOCKERFILE: 'deploy/docker/Dockerfile.sfodbc'
          DOCKER_IMAGE_SUFFIX: '-sf'
        run: |
          # Use the base image loaded from artifact
          export BUILD_FROM=$BASE_TAG
          echo "Building from: $BUILD_FROM"
          ./build ${PROFILE} docker
          echo "Built tags:"
          echo "==========="
          cat .emqx_docker_image_tags
          echo "==========="
          echo "_EMQX_DOCKER_IMAGE_TAG=$(head -n 1 .emqx_docker_image_tags)" >> $GITHUB_ENV

      - name: smoke test
        timeout-minutes: 1
        run: |
          CID=$(docker run -d -p 18083:18083 $_EMQX_DOCKER_IMAGE_TAG)
          HTTP_PORT=$(docker inspect --format='{{(index (index .NetworkSettings.Ports "18083/tcp") 0).HostPort}}' $CID)
          ./scripts/test/emqx-smoke-test.sh localhost $HTTP_PORT
          docker rm -f $CID

      - name: dashboard tests
        working-directory: ./scripts/ui-tests
        timeout-minutes: 5
        run: |
          set -eu
          docker compose up --abort-on-container-exit --exit-code-from selenium
          docker compose rm -fsv

      - name: test node_dump
        run: |
          CID=$(docker run -d -P $_EMQX_DOCKER_IMAGE_TAG)
          docker exec -t -u root -w /root $CID bash -c 'apt-get -y update && apt-get -y install net-tools'
          docker exec -t -u root $CID node_dump
          docker rm -f $CID

      - name: Export snowflake docker image
        run: |
          docker save "${_EMQX_DOCKER_IMAGE_TAG}" | gzip > $PROFILE-docker-sf-${{ matrix.arch }}.tar.gz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.PROFILE }}-docker-sf-${{ matrix.arch }}"
          path: "${{ env.PROFILE }}-docker-sf-${{ matrix.arch }}.tar.gz"
          retention-days: 7

  publish-base:
    runs-on: ubuntu-22.04
    # Always runs on workflow_dispatch (dry-run when publish=false) so
    # developers can test the full manifest-assembly flow.
    # On workflow_call the job only runs when publish=true.
    if: |
      !cancelled() && needs.docker.result == 'success'
      && (inputs.publish || github.event_name == 'workflow_dispatch')
    needs:
      - docker
    defaults:
      run:
        shell: bash

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    env:
      PROFILE: ${{ inputs.profile }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: network=host

      - name: Login to hub.docker.com
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: inputs.publish
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Download docker images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "${{ inputs.profile }}-docker-*"
          path: images/
          merge-multiple: true

      - name: Publish multi-arch manifest
        env:
          OWNER: ${{ github.repository_owner }}
          LATEST: ${{ inputs.latest }}
          PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          ARGS=(
              --amd64 "images/${PROFILE}-docker-amd64.tar.gz"
              --arm64 "images/${PROFILE}-docker-arm64.tar.gz"
              --owner "$OWNER"
              --profile "$PROFILE"
              --variant base
          )
          if [ "$LATEST" = "true" ]; then ARGS+=(--latest); fi
          if [ "$PUBLISH" = "true" ]; then ARGS+=(--publish); fi
          ./scripts/publish-docker-multi-arch.sh "${ARGS[@]}"

  publish-sf:
    runs-on: ubuntu-22.04
    # Snowflake variant: runs only when docker-sfodbc actually succeeded.
    # For non-enterprise builds docker-sfodbc is skipped, so this job is
    # skipped naturally — no extra gating needed.
    if: |
      !cancelled() && needs.docker-sfodbc.result == 'success'
      && (inputs.publish || github.event_name == 'workflow_dispatch')
    needs:
      - docker-sfodbc
    defaults:
      run:
        shell: bash

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    env:
      PROFILE: ${{ inputs.profile }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: network=host

      - name: Login to hub.docker.com
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: inputs.publish
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Download docker images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "${{ inputs.profile }}-docker-sf-*"
          path: images/
          merge-multiple: true

      - name: Publish multi-arch manifest
        env:
          OWNER: ${{ github.repository_owner }}
          PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          ARGS=(
              --amd64 "images/${PROFILE}-docker-sf-amd64.tar.gz"
              --arm64 "images/${PROFILE}-docker-sf-arm64.tar.gz"
              --owner "$OWNER"
              --profile "$PROFILE"
              --variant sf
          )
          if [ "$PUBLISH" = "true" ]; then ARGS+=(--publish); fi
          ./scripts/publish-docker-multi-arch.sh "${ARGS[@]}"

  upload:
    runs-on: ubuntu-22.04
    if: inputs.publish || github.repository_owner != 'emqx'

    needs:
      - docker

    strategy:
      fail-fast: false
      matrix:
        profile:
          - ${{ inputs.profile }}
        arch:
          - amd64
          - arm64
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: "${{ matrix.profile }}-docker-${{ matrix.arch }}"

      - name: Extract version from docker image
        run: |
          FILENAME="${{ matrix.profile }}-docker-${{ matrix.arch }}.tar.gz"
          IMAGE_TAG=$(tar -xzOf "$FILENAME" manifest.json | grep -o '"[^"]*:[^"]*"' | head -1 | tr -d '"')
          PKG_VSN=$(echo "$IMAGE_TAG" | sed 's/.*://')
          echo "PKG_VSN=$PKG_VSN" | tee -a $GITHUB_ENV
          echo "FILENAME=$FILENAME" | tee -a $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: upload to aws s3
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_CLOUDFRONT_ID: ${{ secrets.AWS_CLOUDFRONT_ID }}
        run: |
          set -xeuo pipefail

          export s3dir="emqx-ee/e$PKG_VSN"
          aws s3 cp "$FILENAME" "s3://$AWS_S3_BUCKET/$s3dir/"
          aws cloudfront create-invalidation --distribution-id "$AWS_CLOUDFRONT_ID" --paths "/$s3dir/*docker*"
