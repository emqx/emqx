name: Build and push docker images

concurrency:
  group: docker-build-${{ github.event_name }}-${{ inputs.profile }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      profile:
        required: true
        type: string
      latest:
        required: false
        type: string
        default: false
      publish:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKER_HUB_USER:
        required: false
      DOCKER_HUB_TOKEN:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_DEFAULT_REGION:
        required: false
      AWS_S3_BUCKET:
        required: false
      AWS_CLOUDFRONT_ID:
        required: false
  workflow_dispatch:
    inputs:
      ref:
        required: false
      profile:
        required: false
        type: string
        default: 'emqx-enterprise'
      latest:
        required: false
        type: boolean
        default: false
      publish:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  docker:
    runs-on: ${{ format('aws-ubuntu22.04-{0}', matrix.arch) }}
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        profile:
          - "${{ inputs.profile }}"
        arch:
          - amd64
          - arm64

    env:
      PROFILE: ${{ matrix.profile }}
      DOCKER_ORG: ${{ github.repository_owner }}
      ARCH: ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build docker image
        env:
          DOCKER_PUSH: false
          DOCKER_BUILD_NOCACHE: true
          DOCKER_LOAD: true
        run: |
          ./build ${PROFILE} docker
          echo "Built tags:"
          echo "==========="
          cat .emqx_docker_image_tags
          echo "==========="
          echo "_EMQX_DOCKER_IMAGE_TAG=$(head -n 1 .emqx_docker_image_tags)" >> $GITHUB_ENV

      - name: Verify that size of docker image is less than 150 MB
        run: |
          docker save $_EMQX_DOCKER_IMAGE_TAG | gzip -c | wc -c | xargs -I {} test {} -lt 150000000

      - name: smoke test
        timeout-minutes: 5
        run: |
          CID=$(docker run -d -p 18083:18083 $_EMQX_DOCKER_IMAGE_TAG)
          HTTP_PORT=$(docker inspect --format='{{(index (index .NetworkSettings.Ports "18083/tcp") 0).HostPort}}' $CID)
          ./scripts/test/emqx-smoke-test.sh localhost $HTTP_PORT
          docker rm -f $CID
          ./scripts/test/cluster-smoke-test.sh $_EMQX_DOCKER_IMAGE_TAG

      - name: dashboard tests
        working-directory: ./scripts/ui-tests
        timeout-minutes: 5
        run: |
          set -eu
          docker compose up --abort-on-container-exit --exit-code-from selenium
          docker compose rm -fsv

      - name: test node_dump
        run: |
          CID=$(docker run -d -P $_EMQX_DOCKER_IMAGE_TAG)
          docker exec -t -u root -w /root $CID bash -c 'apt-get -y update && apt-get -y install net-tools'
          docker exec -t -u root $CID node_dump
          docker rm -f $CID

      - name: Export docker image
        run: |
          docker save "${_EMQX_DOCKER_IMAGE_TAG}" | gzip > $PROFILE-docker-${{ matrix.arch }}.tar.gz

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: "${{ matrix.profile }}-docker-${{ matrix.arch }}"
          path: "${{ matrix.profile }}-docker-${{ matrix.arch }}.tar.gz"
          retention-days: 7

  docker-sfodbc:
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    if: inputs.profile == 'emqx-enterprise'
    needs:
      - docker
    defaults:
      run:
        shell: bash

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    env:
      PROFILE: ${{ inputs.profile }}
      ARCH: ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: "${{ env.PROFILE }}-docker-${{ matrix.arch }}"

      - name: Load and push base image to local registry
        run: |
          # Load the base image
          BASE_TAG=$(docker load < $PROFILE-docker-${{ matrix.arch }}.tar.gz | grep "Loaded image:" | sed 's/Loaded image: //')
          echo "Loaded base image: $BASE_TAG"

          # Extract version from tag
          PKG_VSN=$(echo "$BASE_TAG" | sed 's/.*://')
          echo "PKG_VSN=$PKG_VSN" >> $GITHUB_ENV

          # Push to local registry so buildx can access it
          LOCAL_TAG="localhost:5000/emqx/${PROFILE}:${PKG_VSN}"
          docker tag "$BASE_TAG" "$LOCAL_TAG"
          docker push "$LOCAL_TAG"

          echo "BASE_TAG=$LOCAL_TAG" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver-opts: network=host

      - name: Build snowflake docker image
        env:
          DOCKER_PUSH: false
          DOCKER_BUILD_NOCACHE: true
          DOCKER_LOAD: true
          EMQX_DOCKERFILE: 'deploy/docker/Dockerfile.sfodbc'
          DOCKER_IMAGE_SUFFIX: '-sf'
        run: |
          # Use the base image loaded from artifact
          export BUILD_FROM=$BASE_TAG
          echo "Building from: $BUILD_FROM"
          ./build ${PROFILE} docker
          echo "Built tags:"
          echo "==========="
          cat .emqx_docker_image_tags
          echo "==========="
          echo "_EMQX_DOCKER_IMAGE_TAG=$(head -n 1 .emqx_docker_image_tags)" >> $GITHUB_ENV

      - name: smoke test
        timeout-minutes: 1
        run: |
          CID=$(docker run -d -p 18083:18083 $_EMQX_DOCKER_IMAGE_TAG)
          HTTP_PORT=$(docker inspect --format='{{(index (index .NetworkSettings.Ports "18083/tcp") 0).HostPort}}' $CID)
          ./scripts/test/emqx-smoke-test.sh localhost $HTTP_PORT
          docker rm -f $CID

      - name: dashboard tests
        working-directory: ./scripts/ui-tests
        timeout-minutes: 5
        run: |
          set -eu
          docker compose up --abort-on-container-exit --exit-code-from selenium
          docker compose rm -fsv

      - name: test node_dump
        run: |
          CID=$(docker run -d -P $_EMQX_DOCKER_IMAGE_TAG)
          docker exec -t -u root -w /root $CID bash -c 'apt-get -y update && apt-get -y install net-tools'
          docker exec -t -u root $CID node_dump
          docker rm -f $CID

      - name: Export snowflake docker image
        run: |
          docker save "${_EMQX_DOCKER_IMAGE_TAG}" | gzip > $PROFILE-docker-sf-${{ matrix.arch }}.tar.gz

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: "${{ env.PROFILE }}-sf-docker-${{ matrix.arch }}"
          path: "${{ env.PROFILE }}-docker-sf-${{ matrix.arch }}.tar.gz"
          retention-days: 7

  publish:
    runs-on: ubuntu-22.04
    # The base variant only needs `docker` to succeed. A failed
    # `docker-sfodbc` must not block the base publication, so the
    # job-level `if:` checks only `docker`. The sf variant handles its
    # own upstream gate in the Gate step below.
    if: |
      !cancelled() && inputs.publish && needs.docker.result == 'success'
    needs:
      - docker
      # docker-sfodbc is only consumed by the sf matrix variant, but
      # GitHub Actions matrix entries share `needs:`, so both list it.
      # The gate step below no-ops the sf variant when docker-sfodbc
      # didn't succeed.
      - docker-sfodbc
    defaults:
      run:
        shell: bash

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: base
            artifact_pattern: "${{ inputs.profile }}-docker-*"
            # base variant: profile-named tarball (no -sf suffix)
            tarball_prefix: "docker"
          - variant: sf
            artifact_pattern: "${{ inputs.profile }}-sf-docker-*"
            # sf variant: snowflake tarball named with -sf- infix
            tarball_prefix: "docker-sf"

    env:
      PROFILE: ${{ inputs.profile }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Gate variant on upstream
        id: gate
        env:
          VARIANT: ${{ matrix.variant }}
          SFODBC_RESULT: ${{ needs.docker-sfodbc.result }}
        run: |
          # sf variant only runs when docker-sfodbc actually succeeded.
          # For non-enterprise builds it's skipped; for a broken snowflake
          # build it's failed. Either way, the sf matrix entry no-ops and
          # the base variant still publishes.
          if [ "$VARIANT" = "sf" ] && [ "$SFODBC_RESULT" != "success" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
          else
              echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        if: steps.gate.outputs.skip == 'false'
        with:
          driver-opts: network=host

      - name: Login to hub.docker.com
        if: steps.gate.outputs.skip == 'false'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Download docker images
        if: steps.gate.outputs.skip == 'false'
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: "${{ matrix.artifact_pattern }}"
          path: images/
          merge-multiple: true

      - name: Materialize per-arch refs in local registry
        if: steps.gate.outputs.skip == 'false'
        id: refs
        run: |
          set -euo pipefail

          LOCAL_BASE="localhost:5000/${{ github.repository_owner }}/${PROFILE}"
          TARBALL_PREFIX="${{ matrix.tarball_prefix }}"

          # amd64
          AMD64_LOADED=$(docker load < "images/${PROFILE}-${TARBALL_PREFIX}-amd64.tar.gz" | grep "Loaded image:" | sed 's/Loaded image: //')
          echo "Loaded amd64 image: $AMD64_LOADED"
          VERSION="${AMD64_LOADED##*:}"
          AMD64_REF="${LOCAL_BASE}:${VERSION}-amd64"
          docker tag "$AMD64_LOADED" "$AMD64_REF"
          docker push "$AMD64_REF"

          # arm64
          ARM64_LOADED=$(docker load < "images/${PROFILE}-${TARBALL_PREFIX}-arm64.tar.gz" | grep "Loaded image:" | sed 's/Loaded image: //')
          echo "Loaded arm64 image: $ARM64_LOADED"
          ARM64_VERSION="${ARM64_LOADED##*:}"
          ARM64_REF="${LOCAL_BASE}:${ARM64_VERSION}-arm64"
          docker tag "$ARM64_LOADED" "$ARM64_REF"
          docker push "$ARM64_REF"

          if [ "$VERSION" != "$ARM64_VERSION" ]; then
              echo "error: amd64 version ($VERSION) does not match arm64 version ($ARM64_VERSION)" >&2
              exit 1
          fi

          {
              echo "amd64_ref=$AMD64_REF"
              echo "arm64_ref=$ARM64_REF"
              echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Assemble and push multi-arch manifest
        if: steps.gate.outputs.skip == 'false'
        env:
          DOCKER_LATEST: ${{ inputs.latest }}
          OWNER: ${{ github.repository_owner }}
          VARIANT: ${{ matrix.variant }}
          VERSION: ${{ steps.refs.outputs.version }}
          AMD64_REF: ${{ steps.refs.outputs.amd64_ref }}
          ARM64_REF: ${{ steps.refs.outputs.arm64_ref }}
        run: |
          set -euo pipefail

          TAG_ARGS=(--tag "docker.io/${OWNER}/${PROFILE}:${VERSION}")
          if [ "$VARIANT" = "base" ]; then
              TAG_ARGS+=(--tag "docker.io/emqx/emqx:${VERSION}")
              if [ "$DOCKER_LATEST" = "true" ]; then
                  TAG_ARGS+=(--tag "docker.io/${OWNER}/${PROFILE}:latest")
                  TAG_ARGS+=(--tag "docker.io/emqx/emqx:latest")
              fi
          fi

          ./scripts/docker-publish-manifest.sh \
              --source "$AMD64_REF" \
              --source "$ARM64_REF" \
              "${TAG_ARGS[@]}"

  upload:
    runs-on: ubuntu-22.04
    if: inputs.publish || github.repository_owner != 'emqx'

    needs:
      - docker

    strategy:
      fail-fast: false
      matrix:
        profile:
          - ${{ inputs.profile }}
        arch:
          - amd64
          - arm64
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: "${{ matrix.profile }}-docker-${{ matrix.arch }}"

      - name: Extract version from docker image
        run: |
          FILENAME="${{ matrix.profile }}-docker-${{ matrix.arch }}.tar.gz"
          IMAGE_TAG=$(tar -xzOf "$FILENAME" manifest.json | grep -o '"[^"]*:[^"]*"' | head -1 | tr -d '"')
          PKG_VSN=$(echo "$IMAGE_TAG" | sed 's/.*://')
          echo "PKG_VSN=$PKG_VSN" | tee -a $GITHUB_ENV
          echo "FILENAME=$FILENAME" | tee -a $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: upload to aws s3
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_CLOUDFRONT_ID: ${{ secrets.AWS_CLOUDFRONT_ID }}
        run: |
          set -xeuo pipefail

          export s3dir="emqx-ee/e$PKG_VSN"
          aws s3 cp "$FILENAME" "s3://$AWS_S3_BUCKET/$s3dir/"
          aws cloudfront create-invalidation --distribution-id "$AWS_CLOUDFRONT_ID" --paths "/$s3dir/*docker*"
