services:
  qdb:
    image: bureau14/qdb:3.14.1
    container_name: qdb
    networks:
      emqx_bridge:
        # quasardb is picky and doesn't let one connect using hostnames...
        ipv4_address: 172.100.239.30
    expose:
      - "2836"
    volumes:
      - ./quasardb/cluster_secret_key.txt:/opt/qdb/etc/cluster_secret_key.txt:ro
      - ./quasardb/users.json:/opt/qdb/etc/users.json:ro
    environment:
      - QDB_LOCAL_NETWORK_PARALLELISM=2
      - QDB_GLOBAL_SECURITY_ENABLED=true
      - QDB_GLOBAL_SECURITY_CLUSTER_PRIVATE_FILE=/opt/qdb/etc/cluster_secret_key.txt
      - QDB_GLOBAL_SECURITY_USER_LIST=/opt/qdb/etc/users.json

  # for debugging
  # docker run -it --rm --network emqx_bridge --name qdbsh bureau14/qdbsh --cluster qdb://172.100.239.30:2836

## Cluster secret and users were generated by starting a qdb container without
## `QDB_GLOBAL_SECURITY_ENABLED=true`, and then running the following inside it:
## ```
## cd /opt/qdb
## bin/qdb_cluster_keygen -p public -s secret; cat public ; echo ; cat secret ; echo
## bin/qdb_user_add --uid 1 --username root --superuser 1 --output-secret /tmp/root.json --output-public /tmp/users.json
### `30` in the line below comes from `2 | 4 | 8 | 16`, which means select + insert + update + delete
### see https://doc.quasar.ai/master/user-guide/tools/qdb_user_add.html#privileges
## bin/qdb_user_add --uid 2 --username john --privileges 30 --output-secret /tmp/john.json --output-public /tmp/users.json
## cat /tmp/root.json ; echo ; cat /tmp/john.json ; echo ; cat /tmp/users.json ; echo
